<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Review Form</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url('main.jpg'); /* Your background image */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .review-form {
            background-color: rgba(132, 125, 125, 0.7); /* Transparent white background */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .review-form input[type="text"],
        .review-form input[type="email"],
        .review-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .review-form textarea {
            height: 200px;
            width: 400px;
            resize: none;
        }

        .review-form input[type="submit"] {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .review-form input[type="submit"]:hover {
            background-color: #b3008f;
        }
    </style>
</head>
<body>
    <div class="review-form">
        <center><h2>Hotel Review Form</h2></center>
        <form method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br>

            <label for="review">Review:</label><br>
            <textarea id="review" name="review" required></textarea><br>

            <center><input type="submit" value="Submit Review" id="rev" onclick="rev()"></center>
        </form>
    </div>
</body>
<script>
    function rev() {
        
          
        alert("Your review has been submitted.");
            
    }
    document.getElementById("rev").addEventListener("click", rev);
</script>
</html>
