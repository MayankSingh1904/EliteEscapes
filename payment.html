<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-image"></div>
    <div class="form-container">
        <center><img src="eliteescapes_logo.jpeg" height="20%" width="20%"></center>
        <h2 style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif ; color: #a8b2bb;">PAYMENT GATEWAY</h2>
        <br>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Booker's Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="write your emailhere" required>
            </div>
            <div class="form-group">
                <label for="people">Number of People</label>
                <input type="number" id="people" name="people" placeholder="enter number of people">
            </div>
            <div class="form-group">
                <label for="people">Number of Nights</label>
                <input type="number" id="people" name="people" placeholder="enter number of nights to stay">
            </div>
            <div class="form-group">
                <label for="checkin">Check-in Date</label>
                <input type="date" id="checkin" name="checkin" required>
            </div>
            <div class="form-group">
                <label for="checkout">Checkout Date</label>
                <input type="date" id="checkout" name="checkout" required>
            </div>
            <div class="form-group">
                <label for="room-type">Room Type</label>
                <select id="room-type" name="room-type" required>
                    <option value="standard">Family Rooms</option>
                    <option value="deluxe">Daily Rooms</option>
                    <option value="suite">Royal Suite</option>
                    <option value="villa">Zen- Garden</option>
                    <option value="penthouse">Skyline Penthouse</option>
                    <option value="penthouse">Exclusive Rooms</option>
                </select>
            </div>
            <div class="form-group">
                <input type="checkbox" id="privacy" name="privacy" required>
                <label for="privacy">I agree to the payment privacy policy</label>
            </div>
            <div class="form-group">
                <label for="card-number">Credit Card Number</label>
                <input type="text" id="card-number" name="card-number" placeholder="8888-8888-8888-88"required>
            </div>
            <div class="form-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" name="cvv" placeholder="------8-----8-----8-----">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="8888888888888" required>
            </div>
            <button type="button" id="confirm-payment" onclick="processPayment()">Confirm Payment</button>

        </form>
    </div>
</body>
<style>
    body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}

.background-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('main.jpg');
    background-size: cover;
    z-index: -1;
}

.form-container {
    position: absolute;
    top: 90%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: rgba(16, 10, 10, 0.477);
    padding: 80px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.form-container h2 {
    text-align: center;
    color: #ffffff;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    color: #ffffff;
}

input[type="text"],
input[type="email"],
input[type="number"],
input[type="date"],
select,
textarea {
    width: 70%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

input[type="checkbox"] {
    margin-right: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background-color: #007bff;
    border: none;
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #00b324;
}

</style>
<script>
    function processPayment() {
        var totalAmount = prompt("Please enter the total amount:");

        if (totalAmount !== null && !isNaN(totalAmount)) {
          
                alert("Payment done successfully. Here is your ticket ID 89897654. We will email you within 2 hours.");
            
        }
    }
    document.getElementById("confirm-payment").addEventListener("click", processPayment);
</script>

</html>
